<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木言 | 五一出逃计划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+SC:wght@400;700;900&family=Special+Elite&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F8F4E6; 
            --ink: #2C2A28; 
            --retro-red: #FF4A3D; 
            --retro-yellow: #FFD000; 
            --retro-blue: #0055FF; 
            --retro-green: #00A676; 
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif !important;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-hand { font-family: 'Zhi Mang Xing', cursive !important; }
        .font-display { font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.05em; }
        .font-serif-bold { font-family: 'Noto Serif SC', 'Songti SC', serif !important; font-weight: 900; }
        .font-typewriter { font-family: 'Special Elite', 'Courier New', Courier, monospace !important; font-weight: bold; }

        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.45;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }
        .halftone-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
            background-image: radial-gradient(circle, rgba(200, 180, 150, 0.4) 2px, transparent 2.5px);
            background-size: 16px 16px;
        }

        .ransom-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--ink);
            text-transform: uppercase;
            line-height: 1;
        }

        .zine-highlight {
            background: linear-gradient(104deg, rgba(255,208,0,0) 0.9%, var(--retro-yellow) 2.4%, rgba(255,208,0,0.8) 5.8%, rgba(255,208,0,0.2) 93%, var(--retro-yellow) 96%, rgba(255,208,0,0) 98%);
            padding: 0 0.2em;
        }

        .tape {
            position: absolute;
            width: 140px;
            height: 35px;
            background-color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0,0,0,0.2);
            box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .btn-zine { transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .btn-zine:hover {
            transform: translate(-5px, -5px) rotate(-1deg);
            box-shadow: 8px 8px 0px var(--retro-blue);
            background-color: var(--retro-yellow);
            color: var(--ink);
            border-color: var(--ink);
        }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .animate-float { animation: float 5s ease-in-out infinite; }
        .animate-wiggle { animation: wiggle 3s ease-in-out infinite; }
        .animate-shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="relative min-h-screen">
    <div class="halftone-bg"></div>
    <div class="noise-bg"></div>

    <main id="app" class="pt-6 pb-16 px-4 max-w-2xl mx-auto relative z-10 min-h-screen flex flex-col justify-center">
    </main>

    <script>
        const appDiv = document.getElementById('app');
        const CORRECT_CODE = 'Melodyan';

        function renderLanding() {
            appDiv.innerHTML = `
                <div class="fade-enter-active">
                    <!-- 顶部胶带装饰 -->
                    <div class="absolute top-8 left-8 tape transform -rotate-6 z-30"></div>
                    <div class="absolute top-16 right-12 tape transform rotate-3 z-30"></div>

                    <!-- 标题区 -->
                    <div class="text-center mb-12">
                        <div class="inline-block bg-[var(--ink)] text-[var(--paper)] font-typewriter text-sm px-3 py-1 mb-6 transform -rotate-1">
                            木言 Melody × 五一限定
                        </div>
                        
                        <!-- 巨型拼贴标题 -->
                        <div class="flex flex-wrap justify-center gap-2 mb-8 drop-shadow-xl">
                            <span class="ransom-char bg-[var(--retro-red)] text-white transform -rotate-3 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--ink)]">五</span>
                            <span class="ransom-char bg-[var(--retro-yellow)] text-[var(--ink)] transform rotate-2 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--retro-red)]">一</span>
                            <span class="ransom-char bg-[var(--ink)] text-[var(--retro-yellow)] transform -rotate-2 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--retro-blue)]">出</span>
                            <span class="ransom-char bg-[var(--retro-blue)] text-white transform rotate-3 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--ink)]">逃</span>
                            <span class="ransom-char bg-[var(--retro-green)] text-white transform -rotate-1 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--retro-yellow)]">计</span>
                            <span class="ransom-char bg-white text-[var(--ink)] transform rotate-1 text-4xl md:text-6xl lg:text-7xl px-4 py-3 shadow-[5px_5px_0_var(--retro-blue)]">划</span>
                        </div>

                        <p class="font-serif-bold text-xl md:text-2xl text-[var(--ink)] opacity-80 max-w-md mx-auto leading-relaxed">
                            一份专属的灵魂问卷<br>
                            开出你的<span class="zine-highlight">避世小众良方</span>
                        </p>
                    </div>

                    <!-- 机票装饰 -->
                    <div class="relative w-64 md:w-80 mx-auto mb-12 animate-float">
                        <div class="bg-white border-4 border-[var(--ink)] p-4 relative transform rotate-2 shadow-[8px_8px_0_var(--retro-blue)]">
                            <div class="absolute top-0 left-0 w-full h-2 bg-[var(--retro-red)]"></div>
                            <div class="text-right font-typewriter text-xs text-[var(--ink)] mb-2">MAY 01 // 2026</div>
                            <div class="text-center">
                                <div class="font-typewriter text-sm mb-2">DESTINATION</div>
                                <div class="text-3xl font-serif-bold bg-[var(--retro-blue)] text-white px-4 py-1 inline-block transform -rotate-1 shadow-[3px_3px_0_var(--ink)]">UTOPIA</div>
                            </div>
                            <div class="absolute bottom-3 right-3 w-10 h-10 bg-[var(--retro-red)] rounded-full flex items-center justify-center text-white font-bold text-xs">VIP</div>
                        </div>
                    </div>

                    <!-- 功能介绍 -->
                    <div class="flex flex-wrap justify-center gap-4 mb-10">
                        <div class="bg-white border-3 border-[var(--ink)] p-4 flex items-center gap-3 shadow-[4px_4px_0_var(--retro-red)]">
                            <span class="text-3xl">🎯</span>
                            <div>
                                <h3 class="font-serif-bold text-lg">灵魂测试</h3>
                                <p class="font-typewriter text-xs text-[var(--ink)] opacity-70">15道深度问题</p>
                            </div>
                        </div>
                        <div class="bg-white border-3 border-[var(--ink)] p-4 flex items-center gap-3 shadow-[4px_4px_0_var(--retro-blue)]">
                            <span class="text-3xl">✈️</span>
                            <div>
                                <h3 class="font-serif-bold text-lg">专属推荐</h3>
                                <p class="font-typewriter text-xs text-[var(--ink)] opacity-70">小众目的地匹配</p>
                            </div>
                        </div>
                        <div class="bg-white border-3 border-[var(--ink)] p-4 flex items-center gap-3 shadow-[4px_4px_0_var(--retro-green)]">
                            <span class="text-3xl">📸</span>
                            <div>
                                <h3 class="font-serif-bold text-lg">精美报告</h3>
                                <p class="font-typewriter text-xs text-[var(--ink)] opacity-70">一键保存分享</p>
                            </div>
                        </div>
                    </div>

                    <!-- 目的地预览 -->
                    <div class="mb-12">
                        <h2 class="font-display text-3xl md:text-4xl text-center mb-6 tracking-widest">FEATURED DESTINATIONS</h2>
                        <div class="flex flex-wrap justify-center gap-4">
                            <span class="bg-[var(--retro-red)] text-white font-typewriter text-sm px-3 py-1 border-2 border-[var(--ink)] shadow-[3px_3px_0_var(--ink)]">沙溪古镇</span>
                            <span class="bg-[var(--retro-blue)] text-white font-typewriter text-sm px-3 py-1 border-2 border-[var(--ink)] shadow-[3px_3px_0_var(--ink)]">南麂岛</span>
                            <span class="bg-[var(--retro-yellow)] text-[var(--ink)] font-typewriter text-sm px-3 py-1 border-2 border-[var(--ink)] shadow-[3px_3px_0_var(--ink)]">景迈山</span>
                            <span class="bg-[var(--retro-green)] text-white font-typewriter text-sm px-3 py-1 border-2 border-[var(--ink)] shadow-[3px_3px_0_var(--ink)]">恩施</span>
                            <span class="bg-[var(--ink)] text-[var(--retro-yellow)] font-typewriter text-sm px-3 py-1 border-2 border-[var(--ink)] shadow-[3px_3px_0_var(--ink)]">+18 更多</span>
                        </div>
                    </div>

                    <!-- 兑换码输入区 -->
                    <div id="code-section" class="bg-[var(--ink)] p-8 border-4 border-[var(--ink)] shadow-[10px_10px_0_var(--retro-yellow)] max-w-md mx-auto">
                        <h2 class="font-display text-3xl text-[var(--retro-yellow)] text-center mb-4 tracking-widest">ENTER PASSCODE</h2>
                        <p class="font-typewriter text-[var(--paper)] text-center text-sm mb-6 opacity-80">输入兑换码解锁完整功能</p>
                        
                        <div id="input-wrapper" class="relative mb-4">
                            <input 
                                type="text" 
                                id="passcode" 
                                placeholder="请输入兑换码"
                                class="w-full p-4 bg-[var(--paper)] border-4 border-[var(--ink)] font-typewriter text-xl text-center tracking-widest placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-[var(--retro-yellow)]"
                                autocomplete="off"
                            >
                        </div>
                        
                        <div id="error-msg" class="hidden font-typewriter text-[var(--retro-red)] text-center text-sm mb-4 animate-shake">
                            ❌ 兑换码错误，请重新输入
                        </div>
                        
                        <button 
                            onclick="verifyCode()"
                            class="w-full py-4 bg-[var(--retro-yellow)] text-[var(--ink)] font-serif-bold text-xl border-4 border-[var(--ink)] btn-zine tracking-widest"
                        >
                            解锁进入 →
                        </button>
                        
                        <p class="font-typewriter text-[var(--paper)] text-center text-xs mt-6 opacity-60">
                            兑换码仅限内部使用
                        </p>
                    </div>
                </div>
            `;

            document.getElementById('passcode').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    verifyCode();
                }
            });
        }

        function verifyCode() {
            const input = document.getElementById('passcode');
            const errorMsg = document.getElementById('error-msg');
            const inputWrapper = document.getElementById('input-wrapper');
            
            if (input.value.trim().toLowerCase() === CORRECT_CODE.toLowerCase()) {
                localStorage.setItem('may_unlock', 'true');
                renderSuccess();
            } else {
                errorMsg.classList.remove('hidden');
                inputWrapper.classList.add('animate-shake');
                input.value = '';
                input.focus();
                setTimeout(() => {
                    inputWrapper.classList.remove('animate-shake');
                }, 500);
            }
        }

        function renderSuccess() {
            appDiv.innerHTML = `
                <div class="fade-enter-active text-center">
                    <div class="inline-block bg-[var(--retro-yellow)] text-[var(--ink)] font-display text-6xl md:text-8xl px-8 py-4 mb-8 border-4 border-[var(--ink)] shadow-[8px_8px_0_var(--retro-blue)] transform -rotate-2">
                        OK
                    </div>
                    <h2 class="font-display text-3xl md:text-4xl text-[var(--retro-yellow)] mb-4 tracking-widest">ACCESS GRANTED</h2>
                    <p class="font-serif-bold text-lg text-[var(--paper)] mb-6 opacity-90">欢迎来到五一出逃计划</p>
                    <div class="inline-block bg-[var(--retro-blue)] text-white font-typewriter px-6 py-2 border-2 border-[var(--paper)] animate-pulse">
                        正在跳转...
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 1500);
        }

        function checkAccess() {
            if (localStorage.getItem('may_unlock') === 'true') {
                window.location.href = 'app.html';
            } else {
                renderLanding();
            }
        }

        checkAccess();
    </script>
</body>
</html>
