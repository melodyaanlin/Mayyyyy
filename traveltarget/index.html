<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一出逃计划 | 木言</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+SC:wght@400;700;900&family=Special+Elite&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 温暖明亮的复古高级色板 */
            --paper: #F8F4E6; 
            --ink: #2C2A28; 
            --retro-red: #FF4A3D; 
            --retro-yellow: #FFD000; 
            --retro-blue: #0055FF; 
            --retro-green: #00A676; 
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif !important;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 核心字体系统 */
        .font-hand { font-family: 'Zhi Mang Xing', cursive !important; }
        .font-display { font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.05em; }
        .font-serif-bold { font-family: 'Noto Serif SC', 'Songti SC', serif !important; font-weight: 900; }
        .font-typewriter { 
            font-family: 'Special Elite', 'Courier New', Courier, monospace !important; 
            font-weight: bold;
        }

        /* 温暖的噪点纹理与复古网点背景 */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.45;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }
        .halftone-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
            background-image: radial-gradient(circle, rgba(200, 180, 150, 0.4) 2px, transparent 2.5px);
            background-size: 16px 16px;
        }

        /* 拼贴剪纸形状 */
        .main-cutout { clip-path: polygon(10% 2%, 92% 5%, 98% 85%, 8% 95%, 0% 50%); }
        .cutout-img { clip-path: polygon(5% 2%, 92% 5%, 98% 85%, 8% 95%, 0% 50%); }
        
        /* 发光描边效果 */
        .photo-stroke-red { border: 4px solid var(--retro-red); }
        .photo-stroke-blue { border: 4px solid var(--retro-blue); }
        .photo-stroke-white { border: 4px solid #fff; }

        /* Ransom Note 拼贴字体基础样式 */
        .ransom-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--ink);
            text-transform: uppercase;
            line-height: 1;
        }

        /* 杂志高亮笔迹 */
        .zine-highlight {
            background: linear-gradient(104deg, rgba(255,208,0,0) 0.9%, var(--retro-yellow) 2.4%, rgba(255,208,0,0.8) 5.8%, rgba(255,208,0,0.2) 93%, var(--retro-yellow) 96%, rgba(255,208,0,0) 98%);
            padding: 0 0.2em;
        }

        /* 胶带效果 */
        .tape {
            position: absolute;
            width: 140px;
            height: 35px;
            background-color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0,0,0,0.2);
            box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .ticket-stub {
            background-color: var(--retro-yellow);
            border: 3px solid var(--ink);
            padding: 5px 15px;
            box-shadow: 6px 6px 0px var(--retro-red);
        }

        /* 按钮悬浮互动 */
        .btn-zine { transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .btn-zine:hover {
            transform: translate(-5px, -5px) rotate(-1deg);
            box-shadow: 8px 8px 0px var(--retro-blue);
            background-color: var(--retro-yellow);
            color: var(--ink);
            border-color: var(--ink);
        }
        .btn-zine:active {
            transform: translate(0px, 0px);
            box-shadow: 0px 0px 0px var(--ink);
        }

        /* 动画体系 */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        @keyframes pulse-scan { 0% { opacity: 0.1; height: 0%; } 50% { opacity: 0.5; height: 100%; } 100% { opacity: 0.1; height: 0%; } }
        @keyframes wave { 0%, 100% { height: 20%; } 50% { height: 80%; } }
        .animate-float { animation: float 5s ease-in-out infinite; }
        .animate-wiggle { animation: wiggle 3s ease-in-out infinite; }
        .animate-scan { animation: pulse-scan 1.5s linear infinite; }
        .animate-wave { animation: wave 1.5s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.5s; }
        
        /* 页面切换动画 */
        .fade-enter { opacity: 0; transform: translateY(15px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s ease-out; }

        /* 强行单行文本截断方案 */
        .single-line-text {
            white-space: nowrap;
            overflow: visible;
        }
    </style>
</head>

                            </p>
                        </div>

                        <button onclick="resetApp()" class="mt-12 px-8 py-4 bg-[var(--ink)] text-[var(--paper)] font-typewriter font-bold text-2xl tracking-widest hover:bg-[var(--retro-red)] transition-colors border-4 border-[var(--ink)] btn-zine">
                            RESTART // 重新测试
                        </button>
                    </div>
                </div>
            `;
            
            // 启动图片轮播
            startCarousels();
        }

        // --- 逻辑处理 ---

        function nextStep() {
            currentStep++;
            if (currentStep <= 15) {
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
                renderQuestion(currentStep - 1);
            } else if (currentStep === 16) {
                renderLoading();
            }
        }

        // 返回上一题功能
        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                renderQuestion(currentStep - 1);
            } else if (currentStep === 1) {
                currentStep = 0;
                userSelections = [];
                renderIntro();
            }
        }

        function handleAnswer(questionIndex, tagString) {
            // 使用数组记录结果，支持任意回退
            userSelections[questionIndex] = tagString;
            setTimeout(nextStep, 200);
        }

        function calculateResult() {
            // 每次出结果前重新统计一遍，完美兼容回退
            let tagCounts = { food: 0, sea: 0, history: 0, slow: 0, nature: 0, active: 0, art: 0 };
            userSelections.forEach(selection => {
                if(selection) {
                    selection.split(',').forEach(tag => { tagCounts[tag]++; });
                }
            });

            let sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
            let topTag1 = sortedTags[0];
            let topTag2 = sortedTags[1];

            destinations.forEach(dest => {
                dest.score = 0;
                dest.tags.forEach(tag => { dest.score += tagCounts[tag] || 0; });
                dest.score += Math.random() * 0.5;
            });

            destinations.sort((a, b) => b.score - a.score);
            const top3 = destinations.slice(0, 3);
            const analysisText = generateAnalysis(topTag1, topTag2);

            currentStep = 17;
            window.scrollTo({ top: 0, behavior: 'auto' });
            renderResult(top3, analysisText);
        }

        // JS驱动的跨渐变轮播图
        function startCarousels() {
            document.querySelectorAll('.carousel-container').forEach(container => {
                let imgs = container.querySelectorAll('.carousel-img');
                if(imgs.length <= 1) return;
                let idx = 0;
                setInterval(() => {
                    imgs[idx].classList.remove('opacity-100');
                    imgs[idx].classList.add('opacity-0');
                    idx = (idx + 1) % imgs.length;
                    imgs[idx].classList.remove('opacity-0');
                    imgs[idx].classList.add('opacity-100');
                }, 3000); // 3秒切换一次
            });
        }

        function generateAnalysis(t1, t2) {
            const dictionary = {
                food: "你的灵魂有一半是由碳水和香料构成的。在这个全员内卷的时代，你深知<span class='zine-highlight'>“吃好一顿饭”</span>才是唯一的救赎。对你来说，五一的意义不在于打卡名胜，而是寻找下一顿隐秘美味的BGM。",
                slow: "你是一个彻底的“时间叛逃者”。城市的钢筋水泥和DDL已经让你电量告急。你不需要特种兵式的行程，你只需要一张舒服的床，一阵风，和<span class='zine-highlight'>一段没有打卡KPI的虚度光阴</span>。",
                nature: "你患上了严重的“大自然缺乏症”。人工雕琢的景观已经无法刺激你的感官，你渴望风、旷野、泥土和不被定义的自由。越是<span class='zine-highlight'>人迹罕至、粗犷野性的地方</span>，越能让你觉得生命鲜活。",
                art: "你带着挑剔的审美在审视这个世界。对你而言，旅行不是放松，而是一次<span class='zine-highlight'>对“美”的狩猎</span>。气味、光影、肌理、破败的废墟或是精致的器物，你总是能在别人忽略的角落捕捉到艺术的张力。",
                sea: "你对蓝色和水有着原始的执念。<span class='zine-highlight'>海浪的白噪音是你最好的安眠药</span>。你内心深处渴望一种广阔无垠的包容感，吹吹海风，把所有的烦恼和焦虑都抛进咸涩的海水里。",
                history: "你是一个迷恋“旧时光”的漫步者。你不喜欢速朽的网红打卡地，你偏爱那些长满了青苔的砖墙、老街坊的闲聊和沉淀了百年岁月的痕迹。你总是在<span class='zine-highlight'>别人的日常里寻找历史的注脚</span>。",
                active: "你的多巴胺渴望被点燃！平淡的日常让你觉得乏味，你需要的是<span class='zine-highlight'>微咸的汗水、加速的心跳</span>和在路上的失控感。无论是翻山越岭还是迎风破浪，你注定无法安静地坐着。"
            };

            let part1 = dictionary[t1] || dictionary['slow'];
            let part2 = dictionary[t2] || dictionary['nature'];

            return `
                <div class="mb-5">
                    <span class="font-typewriter font-bold text-2xl bg-[var(--retro-red)] text-white px-3 py-1 mr-2 shadow-[2px_2px_0_var(--ink)] border-2 border-[var(--ink)]">PRIMARY: ${t1.toUpperCase()}</span><br>
                    <p class="mt-4 text-[var(--ink)] opacity-90">${part1}</p>
                </div>
                <div>
                    <span class="font-typewriter font-bold text-2xl bg-[var(--retro-blue)] text-white px-3 py-1 mr-2 shadow-[2px_2px_0_var(--ink)] border-2 border-[var(--ink)]">SECONDARY: ${t2.toUpperCase()}</span><br>
                    <p class="mt-4 text-[var(--ink)] opacity-90">${part2}</p>
                </div>
            `;
        }

        function resetApp() {
            currentStep = 0;
            userSelections = [];
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderIntro();
        }

        function saveLongImage() {
            const appDiv = document.getElementById('app');
            
            // 尝试使用浏览器原生截图API
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: 'browser' },
                    audio: false
                }).then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0);
                        
                        canvas.toBlob(function(blob) {
                            const link = document.createElement('a');
                            link.download = '五一出逃计划-灵魂鉴定书.png';
                            link.href = URL.createObjectURL(blob);
                            link.click();
                            URL.revokeObjectURL(link.href);
                        }, 'image/png');
                        
                        stream.getTracks().forEach(track => track.stop());
                        video.remove();
                    };
                }).catch(() => {
                    // 如果用户拒绝或不支持，提示使用快捷键
                    fallbackScreenshot();
                });
            } else {
                fallbackScreenshot();
            }
        }
        
        function fallbackScreenshot() {
            alert('💡 截图提示\n\n由于浏览器安全限制，无法自动保存图片。请使用快捷键手动截图：\n\nMac: Command + Shift + 4\nWindows: Win + Shift + S\n\n然后选择整个页面区域保存。');
        }

        // 初始化
        renderIntro();
    </script>
</body>
</html>
